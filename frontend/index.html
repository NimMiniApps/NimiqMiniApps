    <script>
      // Apply theme before first paint to avoid a flash
      const theme = localStorage.theme
        ?? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
      document.documentElement.classList.toggle('dark', theme === 'dark')
    </script>

    <div id="app"></div>
