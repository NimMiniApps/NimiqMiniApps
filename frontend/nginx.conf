map $http_user_agent $social_crawler {
    default 0;
    ~*(facebookexternalhit|facebot|twitterbot|linkedinbot|slackbot|discordbot|whatsapp|telegrambot|applebot|pinterestbot|googlebot|bingbot|embedly|redditbot) 1;
}

upstream backend_og {
    server backend:8080;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        return 404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri @missing_asset;
    }

    location @missing_asset {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # OG prerender for social crawlers (proxies to Go backend)
    location ~ ^/apps/(?<app_slug>[a-z0-9-]+)/?$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        if ($social_crawler) {
            return 418;
        }
        try_files $uri /index.html;
    }

    error_page 418 = @og_prerender;

    location @og_prerender {
        proxy_pass http://backend_og/og/apps/$app_slug;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
