server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
