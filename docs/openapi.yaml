        reward_assets:
          type: array
          description: Assets users can actually receive from this app, such as daily rewards, leaderboard prizes, payouts, tips, faucets, or similar receive-side flows. Leave empty when the app merely accepts, displays, swaps, or supports a token.
          items:
            $ref: '#/components/schemas/Asset'
        release_stage:
          $ref: '#/components/schemas/ReleaseStage'
        website_url:
          type: string
          format: uri
          nullable: true
        github_url:
          type: string
          format: uri
          nullable: true
        icon_url:
          type: string
          format: uri
          nullable: true
        banner_url:
          type: string
          format: uri
          nullable: true
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaItem'
        socials:
          type: array
          items:
            $ref: '#/components/schemas/SocialLink'
        submitter_contact:
          type: string
          maxLength: 200
          description: Private contact; required for public submit

    AppUpdateRequest:
