name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Test
        working-directory: backend
        run: go test ./...
      - name: Build
        working-directory: backend
        run: go build ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build

  # Build and push Docker images to GHCR on pushes to main (used later for Swarm deploys).
  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ matrix.service == 'frontend' && 'https://api.nimiqminiapps.com' || '' }}
          # image names must be lowercase; repo owner is NimMiniApps
          tags: |
            ghcr.io/nimminiapps/nimiq-mini-apps-${{ matrix.service }}:latest
            ghcr.io/nimminiapps/nimiq-mini-apps-${{ matrix.service }}:${{ github.sha }}
